  <style>

    body{font-family:'Georgia','Times New Roman',serif;color:#f0ede8}

    .auth-tab.active{background:#2a2a35;color:#f0ede8}
    .auth-input{width:100%;background:#0f0f13;border:1px solid #2a2a35;border-radius:10px;padding:13px 14px;color:#f0ede8;font-size:16px;outline:none;margin-bottom:10px;-webkit-appearance:none}

    .emoji-grid{display:flex;flex-wrap:wrap;gap:6px}
    .emoji-opt{font-size:22px;background:transparent;border:2px solid transparent;border-radius:8px;padding:4px 5px;cursor:pointer}
    .color-grid{display:flex;flex-wrap:wrap;gap:8px}
    .color-dot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0}
    .submit-btn{width:100%;border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px;margin-bottom:20px}
    .toggle{position:relative;width:44px;height:26px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:#333;border-radius:13px;transition:0.3s;cursor:pointer}
    .toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s}
    input:checked+.toggle-slider{background:#2ecc71}
    input:checked+.toggle-slider:before{transform:translateX(18px)}
    .payment-item{background:#1a1a22;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .payment-check{width:28px;height:28px;border-radius:50%;border:2px solid #444;background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
    .payment-check.paid{background:#2ecc71;border-color:#2ecc71}
    .payments-summary{background:#1a1a22;border-radius:14px;padding:16px;margin-bottom:16px}
    .payments-summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .payments-summary-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid #2a2a35}
    .income-box{background:linear-gradient(135deg,#1a2e1a,#1a1a22);border:1px solid #2ecc7133;border-radius:16px;padding:16px;margin-bottom:12px}
    .income-bar-bg{background:#0f0f13;border-radius:6px;height:10px;overflow:hidden;margin:8px 0}
    .income-bar-fill{height:100%;border-radius:6px;transition:width 0.5s ease}
    #profile-panel{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.7)}
    #profile-panel.show{display:flex;align-items:flex-end}
    .profile-sheet{background:#1a1a22;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;margin:0 auto;animation:slideUp 0.3s ease}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:#2a2a35;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;cursor:pointer;overflow:hidden;border:3px solid #2a2a35}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .profile-stat{background:#0f0f13;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .profile-btn{width:100%;background:#2a2a35;border:none;border-radius:10px;padding:13px;color:#f0ede8;font-size:14px;cursor:pointer;margin-top:8px;font-family:inherit;text-align:left}
    #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:500}
    #modal.show{display:flex}
    .modal-box{background:#1a1a22;border-radius:16px;padding:24px;margin:20px;text-align:center;width:100%;max-width:320px}
    .modal-btns{display:flex;gap:10px;margin-top:16px}
    .modal-cancel{flex:1;background:#2a2a35;border:none;border-radius:8px;padding:11px;color:#f0ede8;cursor:pointer;font-size:14px;font-family:inherit}
    .modal-confirm{flex:1;background:#e74c3c;border:none;border-radius:8px;padding:11px;color:#fff;cursor:pointer;font-size:14px;font-family:inherit}
    #success-overlay{display:none;position:fixed;top:50%;left:50%;font-size:64px;pointer-events:none;z-index:999}
    #success-overlay.show{display:block;animation:successAnim 0.8s ease forwards}
  </style>
</head>
<body>
<div id="app">
  <div id="loading-screen"><div class="spinner"></div><div style="color:#888;font-size:13px;margin-top:8px">Načítám...</div></div>
  <div id="auth-screen">
    <div style="font-size:56px;margin-bottom:12px">💰</div>
    <div style="font-size:26px;font-weight:bold;margin-bottom:4px">Finanční deník</div>
    <div style="font-size:13px;color:#888;margin-bottom:32px">Správa financí v kapse</div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Přihlášení</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Registrace</button>
      </div>
      <input class="auth-input" id="auth-email" type="email" inputmode="email" placeholder="E-mail" autocomplete="email" />
      <input class="auth-input" id="auth-pass" type="password" placeholder="Heslo" autocomplete="current-password" />
      <div id="auth-name-wrap" style="display:none"><input class="auth-input" id="auth-name" type="text" placeholder="Jméno (volitelné)" /></div>
      <div id="auth-confirm-wrap" style="display:none"><input class="auth-input" id="auth-confirm" type="password" placeholder="Heslo znovu" autocomplete="new-password" /></div>
      <button class="auth-btn" id="auth-submit-btn" onclick="submitAuth()">Přihlásit se</button>
      <button class="auth-link" id="forgot-btn" onclick="forgotPassword()">Zapomněl jsem heslo</button>
      <div class="auth-error" id="auth-error"></div>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0"><div style="flex:1;height:1px;background:#2a2a35"></div><span style="font-size:12px;color:#555">nebo</span><div style="flex:1;height:1px;background:#2a2a35"></div></div>
      <button class="auth-btn-ghost" onclick="continueAsGuest()">Pokračovat bez účtu</button>
    </div>
  </div>
  <div id="main-app" style="display:none;flex-direction:column;flex:1">
    <div id="header">
      <div class="header-row">
        <div><div class="header-label">Finanční deník <span class="sync-dot" id="sync-dot"></span></div><div class="header-date" id="header-date">—</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-pill" id="btn-summary" onclick="toggleSummary()">📊 Přehled</button>
          <button class="btn-avatar" id="btn-avatar" onclick="openProfile()">👤</button>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-label">Tento měsíc</div><div class="stat-value" id="stat-month">0 Kč</div></div>
        <div class="stat-box"><div class="stat-label">Dnes</div><div class="stat-value" id="stat-today">0 Kč</div></div>
      </div>
    </div>
    <div id="nav">
      <button class="nav-tab active" id="tab-vydaje" onclick="switchTab('vydaje')"><span class="nav-tab-icon">💸</span>Výdaje</button>
      <button class="nav-tab" id="tab-platby" onclick="switchTab('platby')"><span class="nav-tab-icon">🏦</span>Platby</button>
      <button class="nav-tab" id="tab-plan" onclick="switchTab('plan')"><span class="nav-tab-icon">🎯</span>Plán</button>
      <button class="nav-tab" id="tab-prijmy" onclick="switchTab('prijmy')" style="display:none"><span class="nav-tab-icon">💰</span>Příjmy</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="profile-panel" onclick="closeProfileBg(event)">
  <div class="profile-sheet">
    <div style="width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px"></div>
    <div class="profile-avatar" id="profile-avatar" onclick="triggerAvatarUpload()">👤</div>
    <input type="file" id="avatar-input" accept="image/*" capture="user" style="display:none" onchange="handleAvatarUpload(event)" />
    <div style="text-align:center;margin-bottom:14px">
      <button onclick="triggerAvatarUpload()" style="background:none;border:1px solid #2a2a35;border-radius:20px;padding:5px 14px;color:#888;font-size:12px;cursor:pointer;font-family:inherit;margin-right:6px">📷 Foto</button>
      <button onclick="toggleEmojiPicker()" style="background:none;border:1px solid #2a2a35;border-radius:20px;padding:5px 14px;color:#888;font-size:12px;cursor:pointer;font-family:inherit">😊 Emoji</button>
    </div>
    <div id="emoji-picker" style="display:none;background:#1a1a22;border-radius:12px;padding:12px;margin-bottom:12px">
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="emoji-avatar-grid"></div>
    </div>
    <div style="font-size:18px;font-weight:bold;text-align:center;margin-bottom:4px" id="profile-name-el">Uživatel</div>
    <div style="font-size:13px;color:#888;text-align:center;margin-bottom:20px" id="profile-email-el">—</div>
    <div id="profile-stats-el"></div>
    <button class="profile-btn" onclick="editProfileName()">✏️  Změnit jméno</button>
    <button class="profile-btn" id="profile-sync-btn" onclick="syncNow()" style="display:none">☁️  Synchronizovat data</button>
    <button class="profile-btn" id="profile-logout-btn" onclick="confirmLogout()" style="color:#e74c3c">🚪  Odhlásit se</button>
    <button class="profile-btn" onclick="closeProfilePanel()" style="color:#888">✕  Zavřít</button>
  </div>
</div>

<div id="success-overlay">✅</div>
<div id="modal"><div class="modal-box"><div style="font-size:24px;margin-bottom:8px" id="modal-icon">⚠️</div><div id="modal-text" style="line-height:1.5"></div><div class="modal-btns"><button class="modal-cancel" onclick="closeModal()">Zrušit</button><button class="modal-confirm" id="modal-confirm-btn">Potvrdit</button></div></div></div>

<script type="module">

const DCATS=[{id:"jidlo",name:"Jídlo",emoji:"🍕",color:"#e74c3c"},{id:"nafta",name:"Nafta",emoji:"⛽",color:"#e67e22"},{id:"cigarety",name:"Cigarety",emoji:"🚬",color:"#8e44ad"},{id:"platby_cat",name:"Platby",emoji:"🏠",color:"#2980b9"}];

let cats=[...DCATS],exps={},budgets={},pays=[...DPAYS],payStatus={},incomes={},incomeEnabled=false;
let profile={name:"",avatar:"",joinDate:Date.now()};
let view="main",tab="vydaje",activeCat=null,editCatId=null,editPayId=null;
let nCat={name:"",emoji:"🛒",color:"#3498db"},nPay={name:"",emoji:"💳",amount:""};
let sumMonth=mk(new Date()),authMode="login",syncT=null;

function mk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function czk(n){if(isNaN(n)||n==null)return"0 Kč";return new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(n);}
function fd(s){return new Date(s).toLocaleDateString("cs-CZ",{day:"numeric",month:"short"});}
function tday(){return new Date().toISOString().split("T")[0];}
function tnow(){return new Date().toTimeString().slice(0,5);}
function cmk(){return mk(new Date());}
function gex(m){return exps[m]||[];}
function gct(id,m){return gex(m).filter(e=>e.categoryId===id).reduce((s,e)=>s+e.amount,0);}
function gmt(m){return gex(m).reduce((s,e)=>s+e.amount,0);}
function gtd(){return gex(cmk()).filter(e=>e.date===tday()).reduce((s,e)=>s+e.amount,0);}
function gbud(id){return budgets[id]||{enabled:false,limit:0};}
function gps(m,p){return(payStatus[m]||{})[p]||false;}
function ginc(m){return(incomes[m]||[]).reduce((s,i)=>s+i.amount,0);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function sdot(s){const d=document.getElementById("sync-dot");if(!d)return;d.className="sync-dot"+(s==="syncing"?" syncing":s==="err"?" err":"");}

function lload(){
  try{const d=JSON.parse(localStorage.getItem("fd_data")||"{}");
    if(d.cats&&d.cats.length)cats=d.cats;if(d.exps)exps=d.exps;if(d.budgets)budgets=d.budgets;
    if(d.pays&&d.pays.length)pays=d.pays;if(d.payStatus)payStatus=d.payStatus;
    if(d.incomes)incomes=d.incomes;if(typeof d.incomeEnabled==="boolean")incomeEnabled=d.incomeEnabled;
    if(d.profile)profile={...profile,...d.profile};
  }catch(e){}
  // Load avatar separately
  try{const av=localStorage.getItem("fd_avatar");if(av)profile.avatar=av;}catch(e){}
}
}
function lsave(){
  try{if(profile.avatar)localStorage.setItem("fd_avatar",profile.avatar);}catch(e){}
  const pna={...profile,avatar:""};
  try{localStorage.setItem("fd_data",JSON.stringify({cats,exps,budgets,pays,payStatus,incomes,incomeEnabled,profile:pna}));}catch(e){console.error("lsave failed",e);}
}

function gdata(){const pna={...profile,avatar:""};return{cats,exps,budgets,pays,payStatus,incomes,incomeEnabled,profile:pna,u:Date.now()};}
function applyData(d){
  if(d.cats&&d.cats.length)cats=d.cats;if(d.exps)exps=d.exps;if(d.budgets)budgets=d.budgets;
  if(d.pays&&d.pays.length)pays=d.pays;if(d.payStatus)payStatus=d.payStatus;
  if(d.incomes)incomes=d.incomes;if(typeof d.incomeEnabled==="boolean")incomeEnabled=d.incomeEnabled;
  const savedAvatar=profile.avatar;
  if(d.profile)profile={...profile,...d.profile};
  if(savedAvatar)profile.avatar=savedAvatar; // preserve local avatar
  lsave();
}
async function save(){
  lsave();
  if(isGuest||!user){sdot("ok");return;}
  clearTimeout(syncT);sdot("syncing");
  syncT=setTimeout(async()=>{try{await setDoc(doc(db,"users",user.uid),gdata());sdot("ok");}catch(e){sdot("err");}},1500);
}

window.syncNow=async function(){
  if(!user)return;
  try{sdot("syncing");await setDoc(doc(db,"users",user.uid),gdata());sdot("ok");alert("Synchronizace dokončena!");}
  catch(e){sdot("err");alert("Chyba.");}
};

function subscribe(){
  if(unsub)unsub();
  unsub=onSnapshot(doc(db,"users",user.uid),(snap)=>{
    if(snap.exists())applyData(snap.data());
    render();updateProfileUI();
  });
}

// AUTH
window.switchAuthTab=function(m){
  authMode=m;
  document.getElementById("tab-login").className="auth-tab"+(m==="login"?" active":"");
  document.getElementById("tab-register").className="auth-tab"+(m==="register"?" active":"");
  document.getElementById("auth-name-wrap").style.display=m==="register"?"block":"none";
  document.getElementById("auth-confirm-wrap").style.display=m==="register"?"block":"none";
  document.getElementById("auth-submit-btn").textContent=m==="login"?"Přihlásit se":"Vytvořit účet";
  document.getElementById("forgot-btn").style.display=m==="login"?"block":"none";
  document.getElementById("auth-error").textContent="";
};

window.submitAuth=async function(){
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  const nameVal=document.getElementById("auth-name")?.value.trim()||"";
  const err=document.getElementById("auth-error");err.textContent="";err.style.color="#e74c3c";
  if(!email||!pass){err.textContent="Vyplň email a heslo.";return;}
  if(authMode==="register"){
    const confirm=document.getElementById("auth-confirm")?.value||"";
    if(pass!==confirm){err.textContent="Hesla se neshodují.";return;}
  }
  const btn=document.getElementById("auth-submit-btn");btn.textContent="...";btn.disabled=true;
  try{
    if(authMode==="login")await signInWithEmailAndPassword(auth,email,pass);
    else{await createUserWithEmailAndPassword(auth,email,pass);if(nameVal){profile.name=nameVal;profile.joinDate=Date.now();}}
  }catch(e){
    btn.disabled=false;btn.textContent=authMode==="login"?"Přihlásit se":"Vytvořit účet";
    const msgs={"auth/user-not-found":"Účet neexistuje.","auth/wrong-password":"Špatné heslo.","auth/invalid-credential":"Špatný email nebo heslo.","auth/email-already-in-use":"Email je již použit.","auth/weak-password":"Heslo musí mít alespoň 6 znaků.","auth/invalid-email":"Neplatný email.","auth/too-many-requests":"Příliš mnoho pokusů."};
    err.textContent=msgs[e.code]||"Chyba přihlášení.";
  }
};

window.forgotPassword=async function(){
  const email=document.getElementById("auth-email").value.trim();
  const err=document.getElementById("auth-error");
  if(!email){err.style.color="#e67e22";err.textContent="Zadej svůj email výše.";return;}
  try{await sendPasswordResetEmail(auth,email);err.style.color="#2ecc71";err.textContent="✓ Email pro obnovu hesla byl odeslán!";}
  catch(e){err.style.color="#e74c3c";err.textContent="Nepodařilo se odeslat email.";}
};

window.continueAsGuest=function(){isGuest=true;lload();showMain();sdot("ok");};

window.confirmLogout=function(){
  modal("🚪","Odhlásit se?","Odhlásit",async()=>{
    closeModal();closeProfilePanel();
    if(unsub){unsub();unsub=null;}
    if(!isGuest)await signOut(auth);
    isGuest=false;user=null;
    cats=[...DCATS];exps={};budgets={};pays=[...DPAYS];payStatus={};incomes={};incomeEnabled=false;profile={name:"",avatar:"",joinDate:Date.now()};
    document.getElementById("main-app").style.display="none";
    document.getElementById("auth-screen").style.display="flex";
  });
};

function showMain(){
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("auth-screen").style.display="none";
  const m=document.getElementById("main-app");m.style.display="flex";m.style.flexDirection="column";m.style.flex="1";
  render();updateProfileUI();
}

onAuthStateChanged(auth,(u)=>{
  if(isGuest)return;
  document.getElementById("loading-screen").style.display="none";
  if(u){user=u;isGuest=false;lload();showMain();subscribe();}
  else{user=null;if(unsub){unsub();unsub=null;}document.getElementById("main-app").style.display="none";document.getElementById("auth-screen").style.display="flex";}
});

// PROFILE
function updateProfileUI(){
  const name=profile.name||"Uživatel";
  const email=isGuest?"Režim bez účtu":(user?.email||"");
  document.getElementById("profile-name-el").textContent=name;
  document.getElementById("profile-email-el").textContent=email;
  const av=document.getElementById("btn-avatar");
  const isPhoto=profile.avatar&&profile.avatar.length>10;
  const isEmoji=profile.avatar&&profile.avatar.length<=10&&profile.avatar.length>0;
  if(isPhoto){av.innerHTML=`<img src="${profile.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`;av.style.background="transparent";av.style.fontSize="13px";}
  else if(isEmoji){av.textContent=profile.avatar;av.style.background="#2a2a35";av.style.fontSize="18px";}
  else{av.textContent=name.charAt(0).toUpperCase()||"👤";av.style.background="#2a2a35";av.style.fontSize="13px";}
  const pav=document.getElementById("profile-avatar");
  if(isPhoto){pav.innerHTML=`<img src="${profile.avatar}" style="width:100%;height:100%;object-fit:cover" />`;pav.style.fontSize="32px";}
  else if(isEmoji){pav.textContent=profile.avatar;pav.style.fontSize="40px";}
  else{pav.textContent=name.charAt(0).toUpperCase()||"👤";pav.style.fontSize="32px";}
  const joinDate=profile.joinDate?new Date(profile.joinDate):new Date();
  const days=Math.max(1,Math.floor((Date.now()-joinDate.getTime())/(1000*60*60*24)));
  const totalSpent=Object.values(exps).flat().reduce((s,e)=>s+e.amount,0);
  const totalEntries=Object.values(exps).flat().length;
  document.getElementById("profile-stats-el").innerHTML=`
    <div class="profile-stat"><span style="font-size:12px;color:#888">📅 Používám aplikaci</span><span style="font-size:14px;font-weight:bold">${days} ${days===1?"den":days<5?"dny":"dní"}</span></div>
    <div class="profile-stat"><span style="font-size:12px;color:#888">💸 Celkem zaznamenáno</span><span style="font-size:14px;font-weight:bold">${czk(totalSpent)}</span></div>
    <div class="profile-stat"><span style="font-size:12px;color:#888">📝 Počet záznamů</span><span style="font-size:14px;font-weight:bold">${totalEntries}</span></div>
    <div class="profile-stat"><span style="font-size:12px;color:#888">☁️ Účet</span><span style="font-size:14px;font-weight:bold;color:${isGuest?"#e67e22":"#2ecc71"}">${isGuest?"Bez synchronizace":"Cloud sync"}</span></div>`;
  document.getElementById("profile-sync-btn").style.display=isGuest?"none":"block";
  const logoutBtn=document.getElementById("profile-logout-btn");
  if(isGuest){logoutBtn.textContent="🔑  Přihlásit se / Registrovat";logoutBtn.onclick=()=>{closeProfilePanel();isGuest=false;user=null;document.getElementById("main-app").style.display="none";document.getElementById("auth-screen").style.display="flex";};}
  else{logoutBtn.textContent="🚪  Odhlásit se";logoutBtn.onclick=confirmLogout;}
}

window.openProfile=function(){document.getElementById("profile-panel").classList.add("show");updateProfileUI();};
window.closeProfilePanel=function(){document.getElementById("profile-panel").classList.remove("show");};
window.closeProfileBg=function(e){if(e.target===document.getElementById("profile-panel"))closeProfilePanel();};
window.triggerAvatarUpload=function(){document.getElementById("avatar-input").click();};
window.toggleEmojiPicker=function(){
  const p=document.getElementById("emoji-picker");
  if(!p)return;
  const isOpen=p.style.display!=="none";
  p.style.display=isOpen?"none":"block";
  if(!isOpen){
    const AVEMOJIS=["👤", "😎", "🤠", "🧑", "👨", "👩", "🧔", "👱", "🎅", "🦸", "🧙", "🤖", "🐺", "🦊", "🐻", "🐼", "🦁", "🐯", "🐸", "🐧", "🦋", "🌟", "💎", "🔥", "⚡"];
    const cur=profile.avatar&&profile.avatar.length<10?profile.avatar:"👤";
    document.getElementById("emoji-avatar-grid").innerHTML=AVEMOJIS.map(em=>`<button onclick="setEmojiAvatar('${em}')" style="font-size:24px;background:${em===cur?"#2a2a35":"transparent"};border:2px solid ${em===cur?"#f0ede8":"transparent"};border-radius:8px;padding:4px 5px;cursor:pointer">${em}</button>`).join("");
  }
};
window.setEmojiAvatar=function(em){
  profile.avatar=em;
  try{localStorage.setItem("fd_avatar",em);}catch(err){}
  save();updateProfileUI();
  document.getElementById("emoji-picker").style.display="none";
};
window.handleAvatarUpload=function(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=(ev)=>{
    profile.avatar=ev.target.result;
    try{localStorage.setItem("fd_avatar",profile.avatar);}catch(err){}
    save();updateProfileUI();
  };r.readAsDataURL(file);
};
window.editProfileName=function(){const n=prompt("Zadej své jméno:",profile.name||"");if(n!==null){profile.name=n.trim();save();updateProfileUI();}};

// RENDER
function render(){
  const hd=document.getElementById("header-date");if(hd)hd.textContent=new Date().toLocaleDateString("cs-CZ",{day:"numeric",month:"long",year:"numeric"});
  const sm=document.getElementById("stat-month");if(sm)sm.textContent=czk(gmt(cmk()));
  const st=document.getElementById("stat-today");if(st)st.textContent=czk(gtd());
  const bs=document.getElementById("btn-summary");if(bs){bs.style.background=view==="summary"?"#f0ede8":"#2a2a35";bs.style.color=view==="summary"?"#0f0f13":"#f0ede8";}
  const nv=document.getElementById("nav");if(nv)nv.style.display=view==="main"?"flex":"none";
  ["vydaje","platby","plan","prijmy"].forEach(t=>{const el=document.getElementById("tab-"+t);if(el)el.className="nav-tab"+(tab===t&&view==="main"?" active":"");});
  const ptab=document.getElementById("tab-prijmy");if(ptab)ptab.style.display=incomeEnabled?"flex":"none";
  const c=document.getElementById("content");if(!c)return;
  if(view==="main"){if(tab==="vydaje")rVydaje();else if(tab==="platby")rPlatby();else if(tab==="prijmy")rPrijmy();else rPlan();}
  else if(view==="summary")rSummary();
  else if(view==="addCat")rAddCat();
  else if(view==="addPay")rAddPay();
  else if(view==="addIncome")rAddIncome();
}
window.render=render;

function rVydaje(){
  const m=cmk(),td=gex(m).filter(e=>e.date===tday()),old=gex(m).filter(e=>e.date!==tday()).slice(0,25);
  let h=`<div class="section-label">Kategorie – klepni pro zadání</div><div class="cat-grid">`;
  cats.forEach(cat=>{
    const isA=activeCat&&activeCat.id===cat.id,total=gct(cat.id,m),b=gbud(cat.id);
    let bh="";
    if(b.enabled&&b.limit>0){const p=Math.min((total/b.limit)*100,100),r=b.limit-total,ov=r<0;const fc=p>=100?"#e74c3c":p>=80?"#e67e22":(isA?"rgba(255,255,255,0.7)":cat.color);const rc=ov?"#e74c3c":(isA?"rgba(255,255,255,0.85)":"#2ecc71");bh=`<div style="background:rgba(0,0,0,0.3);border-radius:3px;height:4px;overflow:hidden;margin-top:6px"><div style="width:${p}%;height:100%;border-radius:3px;background:${fc}"></div></div><div style="font-size:10px;color:${rc};margin-top:3px">${ov?"Překročeno o "+czk(Math.abs(r)):"Zbývá "+czk(r)}</div>`;}
    h+=`<div class="cat-card cat-btn" onclick="clickCat('${cat.id}')" style="background:${isA?cat.color:"#1a1a22"};border:2px solid ${isA?cat.color:"#2a2a35"};box-shadow:${isA?`0 0 20px ${cat.color}55`:"none"}">
      <div style="font-size:24px">${cat.emoji}</div>
      <div style="font-size:12px;font-weight:bold;margin-top:4px;color:${isA?"#fff":"#f0ede8"}">${esc(cat.name)}</div>
      <div style="font-size:11px;margin-top:1px;color:${isA?"rgba(255,255,255,0.8)":"#888"}">${total>0?czk(total):"—"}</div>${bh}
      <div class="cat-actions"><button class="cat-action-btn" onclick="event.stopPropagation();editCat('${cat.id}')">✏️</button><button class="cat-action-btn" onclick="event.stopPropagation();delCat('${cat.id}')">🗑️</button></div>
    </div>`;
  });
  h+=`<button class="add-cat-card cat-btn" onclick="openAddCat()"><div style="font-size:24px">➕</div><div style="font-size:12px;margin-top:5px">Přidat kategorii</div></button></div>`;
  if(activeCat){h+=`<div id="input-panel" style="border:2px solid ${activeCat.color};box-shadow:0 0 30px ${activeCat.color}33"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:22px">${activeCat.emoji}</span><span style="font-weight:bold;font-size:15px;color:${activeCat.color}">${esc(activeCat.name)}</span></div><div class="amount-wrap"><input class="amount-input" id="amount-input" type="number" inputmode="decimal" placeholder="Částka" style="border:1px solid ${activeCat.color}77" onkeydown="if(event.key==='Enter')saveExp()" /><span class="amount-unit">Kč</span></div><input class="note-input" id="note-input" type="text" placeholder="Poznámka (volitelné)" onkeydown="if(event.key==='Enter')saveExp()" /><button class="save-btn" style="background:${activeCat.color}" onclick="saveExp()">ULOŽIT VÝDAJ</button></div>`;}
  if(td.length){h+=`<div class="section-label" style="margin-top:4px">Dnešní výdaje</div>`;td.forEach(e=>{h+=erow(e,m,false);});}
  if(old.length){h+=`<div class="section-label" style="margin-top:16px">Dříve tento měsíc</div>`;old.forEach(e=>{h+=erow(e,m,true);});}
  if(!td.length&&!old.length&&!activeCat)h+=`<div style="text-align:center;color:#555;padding:40px 0;font-size:14px">Žádné výdaje tento měsíc.<br>Klepni na kategorii výše.</div>`;
  document.getElementById("content").innerHTML=h;
  if(activeCat)setTimeout(()=>{const i=document.getElementById("amount-input");if(i)i.focus();},100);
}
function erow(e,m,old){const cat=cats.find(c=>c.id===e.categoryId);return `<div class="expense-row" style="border-left:3px solid ${cat?cat.color:"#888"};${old?"opacity:0.85":""}"><span style="font-size:18px;margin-right:10px;flex-shrink:0">${cat?cat.emoji:"?"}</span><div style="flex:1;min-width:0"><div style="font-size:13px;color:${cat?cat.color:"#888"}">${cat?esc(cat.name):"?"}</div>${old?`<div style="font-size:11px;color:#666">${fd(e.date)}${e.note?" · "+esc(e.note):""}</div>`:(e.note?`<div style="font-size:11px;color:#666">${esc(e.note)}</div>`:"")}</div><div style="font-size:15px;font-weight:bold;flex-shrink:0;margin-left:8px">${czk(e.amount)}</div><button class="del-btn" onclick="delExp('${m}',${e.id})">✕</button></div>`;}

function rPlatby(){
  const m=cmk(),ts=pays.reduce((s,p)=>s+(p.amount||0),0),ps=pays.filter(p=>gps(m,p.id)).reduce((s,p)=>s+(p.amount||0),0),pc=pays.filter(p=>gps(m,p.id)).length;
  let h=`<div class="payments-summary"><div class="payments-summary-row"><span style="color:#888;font-size:13px">Celkem závazků</span><span style="font-weight:bold">${czk(ts)}</span></div><div class="payments-summary-row"><span style="color:#2ecc71;font-size:13px">✓ Zaplaceno (${pc}/${pays.length})</span><span style="color:#2ecc71;font-weight:bold">${czk(ps)}</span></div><div class="payments-summary-row"><span style="color:#e67e22;font-size:13px">Zbývá zaplatit</span><span style="color:#e67e22;font-weight:bold;font-size:18px">${czk(ts-ps)}</span></div></div><div class="section-label">Pravidelné platby</div>`;
  [...pays.filter(p=>!gps(m,p.id)),...pays.filter(p=>gps(m,p.id))].forEach(p=>{const ip=gps(m,p.id);h+=`<div class="payment-item" style="opacity:${ip?0.6:1}"><div class="payment-check ${ip?"paid":""}" onclick="togPay('${m}','${p.id}')">${ip?"✓":""}</div><div style="flex:1;min-width:0"><div style="font-weight:bold;font-size:14px;text-decoration:${ip?"line-through":"none"}">${p.emoji} ${esc(p.name)}</div><div style="font-size:12px;color:#888;margin-top:2px">${p.amount?czk(p.amount)+" / měsíc":"Částka nenastavena"}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div style="font-size:15px;font-weight:bold;color:${ip?"#2ecc71":"#f0ede8"}">${p.amount?czk(p.amount):"—"}</div><div style="font-size:10px;color:${ip?"#2ecc71":"#e67e22"}">${ip?"ZAPLACENO":"ČEKÁ"}</div><div style="display:flex;gap:4px"><button class="cat-action-btn" onclick="editPay('${p.id}')">✏️</button><button class="cat-action-btn" onclick="delPay('${p.id}')">🗑️</button></div></div></div>`;});
  h+=`<button class="add-cat-card cat-btn" onclick="openAddPay()" style="width:100%;margin-top:4px"><div style="font-size:24px">➕</div><div style="font-size:12px;margin-top:5px">Přidat platbu</div></button>`;
  document.getElementById("content").innerHTML=h;
}

function rPlan(){
  const m=cmk();let h=`<div class="section-label">Finanční plán – nastav limity</div>`;
  cats.forEach(cat=>{const b=gbud(cat.id),t=gct(cat.id,m),p=b.enabled&&b.limit>0?Math.min((t/b.limit)*100,100):0,r=b.limit-t,ov=r<0,fc=p>=100?"#e74c3c":p>=80?"#e67e22":cat.color;

window.saveIncomeTab=function(){
  const amt=parseFloat(document.getElementById("inc-amount")?.value||0);
  if(!amt||amt<=0){document.getElementById("inc-amount")?.focus();return;}
  const source=document.getElementById("inc-source")?.value.trim()||"";
  const m=cmk();if(!incomes[m])incomes[m]=[];
  incomes[m].unshift({id:Date.now(),amount:amt,source,date:tday()});
  save();render();
  const ov=document.getElementById("success-overlay");ov.classList.remove("show");void ov.offsetWidth;ov.classList.add("show");setTimeout(()=>ov.classList.remove("show"),850);
};

window.switchTab=function(t){tab=t;activeCat=null;view="main";render();};

  if(editPayId){pays=pays.map(p=>p.id===editPayId?{...p,name:nPay.name.trim(),emoji:nPay.emoji,amount:amt}:p);editPayId=null;}
  else pays.push({id:Date.now().toString(),name:nPay.name.trim(),emoji:nPay.emoji,amount:amt});
  save();nPay={name:"",emoji:"💳",amount:""};view="main";tab="platby";render();
};
window.delPay=function(id){modal("🗑️","Smazat tuto platbu?","Smazat",()=>{pays=pays.filter(p=>p.id!==id);save();closeModal();render();});};

document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.getElementById("auth-screen").style.display!=="none")submitAuth();});
</script>
